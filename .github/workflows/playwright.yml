name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: E2E — ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, mobile-chrome]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project == 'mobile-chrome' && 'chromium' || matrix.project }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_ADMIN_USER: ${{ secrets.WP_ADMIN_USER }}
          WP_ADMIN_PASS: ${{ secrets.WP_ADMIN_PASS }}
          WP_HEADING_PAGE_SLUG: ${{ vars.WP_HEADING_PAGE_SLUG || '/tpae-test-heading/' }}
          WP_ACCORDION_PAGE_SLUG: ${{ vars.WP_ACCORDION_PAGE_SLUG || '/tpae-test-accordion/' }}
          WP_BLOG_PAGE_SLUG: ${{ vars.WP_BLOG_PAGE_SLUG || '/tpae-test-blog-listout/' }}
          WP_FORM_PAGE_SLUG: ${{ vars.WP_FORM_PAGE_SLUG || '/tpae-test-plus-form/' }}
          WP_COUNTDOWN_PAGE_SLUG: ${{ vars.WP_COUNTDOWN_PAGE_SLUG || '/tpae-test-countdown/' }}
          WP_COUNTER_PAGE_SLUG: ${{ vars.WP_COUNTER_PAGE_SLUG || '/tpae-test-number-counter/' }}
          WP_FLIPBOX_PAGE_SLUG: ${{ vars.WP_FLIPBOX_PAGE_SLUG || '/tpae-test-flip-box/' }}
          WP_NAV_PAGE_SLUG: ${{ vars.WP_NAV_PAGE_SLUG || '/tpae-test-navigation-menu/' }}
          WP_VIDEO_PAGE_SLUG: ${{ vars.WP_VIDEO_PAGE_SLUG || '/tpae-test-video/' }}
          WP_TABS_PAGE_SLUG: ${{ vars.WP_TABS_PAGE_SLUG || '/tpae-test-tabs-tours/' }}
          WP_COUNTER_TARGET: ${{ vars.WP_COUNTER_TARGET || '100' }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14
