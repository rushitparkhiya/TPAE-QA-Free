name: Pre-Release Gate

on:
  push:
    tags:
      - 'v*'           # triggers on: git tag v6.4.15 && git push --tags

jobs:
  gate:
    name: Gate ${{ matrix.gate }} — ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true        # stop all gates the moment one fails
      matrix:
        include:
          - gate: 2
            label: Release Metadata
            script: |
              bash run-prerelease.sh \
                --version "${{ github.ref_name }}" \
                --plugin "plugins/the-plus-addons-for-elementor-page-builder" \
                --gate 2

          - gate: 3a
            label: TPAE Widget Tests
            script: npx playwright test --project=tpae-chromium --project=tpae-ajax --project=tpae-mobile

          - gate: 3b
            label: TPAE Firefox
            script: npx playwright test --project=tpae-firefox

          - gate: 3c
            label: Orbit Flows + Elementor
            script: npx playwright test --project=orbit-flows --project=orbit-elementor

          - gate: 3d
            label: Orbit Visual + PM
            script: npx playwright test --project=orbit-visual --project=orbit-pm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run gate ${{ matrix.gate }}
        run: ${{ matrix.script }}
        env:
          WP_BASE_URL:             ${{ secrets.WP_BASE_URL }}
          WP_TEST_URL:             ${{ secrets.WP_BASE_URL }}
          WP_ADMIN_USER:           ${{ secrets.WP_ADMIN_USER }}
          WP_ADMIN_PASS:           ${{ secrets.WP_ADMIN_PASS }}
          WP_PLUGIN_PATH:          ${{ secrets.WP_PLUGIN_PATH }}
          WP_HEADING_PAGE_SLUG:    /tpae-test-heading/
          WP_ACCORDION_PAGE_SLUG:  /tpae-test-accordion/
          WP_BLOG_PAGE_SLUG:       /tpae-test-blog-listout/
          WP_FORM_PAGE_SLUG:       /tpae-test-plus-form/
          WP_COUNTDOWN_PAGE_SLUG:  /tpae-test-countdown/
          WP_COUNTER_PAGE_SLUG:    /tpae-test-number-counter/
          WP_FLIPBOX_PAGE_SLUG:    /tpae-test-flip-box/
          WP_NAV_PAGE_SLUG:        /tpae-test-navigation-menu/
          WP_VIDEO_PAGE_SLUG:      /tpae-test-video/
          WP_TABS_PAGE_SLUG:       /tpae-test-tabs-tours/
          WP_COUNTER_TARGET:       100
          CI: true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-gate-${{ matrix.gate }}
          path: |
            reports/html/
            reports/prerelease-*/
          retention-days: 30

  summary:
    name: Release Verdict
    runs-on: ubuntu-latest
    needs: gate
    if: always()
    steps:
      - name: Verdict
        run: |
          if [ "${{ needs.gate.result }}" = "success" ]; then
            echo "🟢 SHIP — All gates passed for ${{ github.ref_name }}"
            echo "Safe to submit to WP.org"
          else
            echo "🔴 BLOCK — One or more gates failed for ${{ github.ref_name }}"
            echo "Check the failing gate artifacts above."
            exit 1
          fi
