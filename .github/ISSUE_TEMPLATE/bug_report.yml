name: Bug Report
description: Report a bug in the TPAE free plugin
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: widget
    attributes:
      label: Widget / Feature
      description: Which widget or feature is affected?
      placeholder: e.g. Flip Box, Blog Listout, Plus Form
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to a page with Flip Box widget
        2. Hover over the box
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: tpae_version
    attributes:
      label: TPAE Version
      placeholder: e.g. 6.4.14
    validations:
      required: true

  - type: input
    id: elementor_version
    attributes:
      label: Elementor Version
      placeholder: e.g. 3.22.0
    validations:
      required: true

  - type: input
    id: wp_version
    attributes:
      label: WordPress Version
      placeholder: e.g. 6.5.0
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: console_errors
    attributes:
      label: Console Errors (if any)
      description: Paste any JavaScript console errors here.
      render: shell
